<head>
  <title>Contactos</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="data:;base64,=">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>
  <main class="contenido-pantalla" id="contenido">
    <!-- ── NAVBAR ── -->
    <nav>
      <div class="nav-links">
        <a onclick="navPerfil()">Perfil</a>
        <a class="active">Contactos</a>
      </div>
    </nav>

    <!-- ── CONTENIDO: dos columnas ── -->
    <div class="layout-contactos">

      <!-- ── COLUMNA IZQUIERDA: lista de contactos ── -->
      <div id="columna-contactos">
        <div id="lista-contactos">
          
        </div>
        <p id="msg-contactos"></p>
      </div>

      <!-- ── COLUMNA DERECHA: buscador + publicaciones ── -->
      <div class="columna-principal">

        <!-- Buscador -->
        <div class="buscador">
          <input type="text" id="input-buscar" placeholder="@username_" />
          <button id="btn-buscarUsuarios">Buscar</button>
        </div>

        <!-- Resultados del buscador -->
        <div id="resultados-busqueda"></div>

        <!-- Publicaciones del contacto seleccionado -->
        <div id="publicaciones-contacto"></div>

      </div>

    </div>
  </main>
  <script src="../js/navigation.js"></script>
</body>

</html>
