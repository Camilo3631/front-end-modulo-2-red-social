<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<main id="chat-contenido">

  <div class="layout">

    <!-- ── COLUMNA IZQUIERDA: chat ── -->
    <div class="columna-chat">

      <!-- Header del chat -->
      <div class="chat-header">
        <div alt="Foto de perfil" class="foto-perfil" id="foto-perfil">
        <i class="fa-solid fa-user"></i>
      </div>
        <h3 id="chat-username">Nombre de usuario</h3>
        <button class="btn-cerrar" onclick="cerrarChat()">✕</button>
      </div>

      <!-- Mensajes -->
      <div class="chat-mensajes" id="chat-mensajes">
        <!-- Se cargan con JS -->
      </div>

      <!-- Barra de escribir -->
      <div class="chat-input">
        <input type="text" id="input-mensaje" placeholder="Escribe tu mensaje..." />
        <div id= "enviarMensaje">
          <!-- Icono enviar -->
        </div>
      </div>

    </div>

    <!-- ── COLUMNA DERECHA ── -->
    <div class="columna-lateral">

      <!-- Lista de contactos -->
      <div class="lateral-contactos">
        <div class="lateral-header">
          <h2>Contactos</h2>
        </div>
        <ul id="lista-contactos">
          <!-- Se cargan con JS -->
        </ul>
      </div>

      <!-- Perfil propio -->
      <div class="lateral-perfil">
        <h2>Perfil</h2>
        <div class="perfil-fila" onclick="abrirPerfil()">
          <img src="" class="foto"/>
          <span id="mi-username">Nombre de usuario</span>
        </div>
      </div>

    </div>

  </div>
</main>

  <script src="../js/navigation.js"></script>

</body>
</html>
