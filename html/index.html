<!DOCTYPE html>
<html lang="esp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio sesión</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <main id="contenido" class="contenido-login">
    <section>
      <!--INICIO SESION  →  POST /usuarios/login -->

      <div class="seccion">
 
    <h1>Iniciar sesión</h1>
 
    <div class="field">
      <label for="login-username">Correo electrónico</label>
      <input type="text" id="login-email" placeholder="usuario@email.com" />
      <span class="field-error" id="err-username"></span>
    </div>
 
    <div class="field">
      <label for="login-contrasena">Contraseña</label>
      <input type="password" id="login-contrasena" placeholder="••••••••" />
      <span class="field-error" id="err-contrasena"></span>
    </div>
 
    <div class="msg" id="msg-login"></div>
 
    <button id="btn-iniciar-sesion" onclick="iniciarSesion()">Entrar</button>
 
    <span class="enlace">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></span>
 
  </div>
  <span id="error-inicio-sesion" class="field-error"></span>
    </section>
    </main>

    <script src="../js/index.js"></script>
    <script src="../js/ navigation.js"></script>

</body>
</html>
