<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio sesión</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>
    
    <section>
      <!--INICIO SESION  →  POST /usuarios/login -->

      <div class="card">
 
    <h1>Iniciar sesión</h1>
 
    <div class="field">
      <label for="login-username">Nombre de usuario</label>
      <input type="text" id="login-username" placeholder="mi_usuario" />
      <span class="field-error" id="err-username"></span>
    </div>
 
    <div class="field">
      <label for="login-contrasena">Contraseña</label>
      <input type="password" id="login-contrasena" placeholder="••••••••" />
      <span class="field-error" id="err-contrasena"></span>
    </div>
 
    <div class="msg" id="msg-login"></div>
 
    <button onclick="iniciarSesion()">Entrar</button>
 
    <p class="enlace">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
 
  </div>
    </section>

</body>
</html>
