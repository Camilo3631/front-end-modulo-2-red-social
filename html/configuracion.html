<div>
  <button onclick="toggleSettings(true)" title="Ajustes">x</button>
  <div>
    <h2>Avatar</h2>
    <div class="avatar-opciones">
      <div alt="Avatar 1" class="avatar-opcion" id="btn-seleccionar-avatar-1" style="background-color: rgb(154, 227, 154);">
        <i class="fa-solid fa-user"></i>
      </div>
      <div alt="Avatar 2" class="avatar-opcion" id="btn-seleccionar-avatar-2" style="background-color: rgb(228, 181, 115);">
        <i class="fa-solid fa-user"></i>
      </div>
      <div alt="Avatar 3" class="avatar-opcion" id="btn-seleccionar-avatar-3" style="background-color: rgb(200, 118, 236);">
        <i class="fa-solid fa-user"></i>
      </div>
      <div alt="Avatar 4" class="avatar-opcion" id="btn-seleccionar-avatar-4" style="background-color: rgb(151, 193, 242);">
        <i class="fa-solid fa-user"></i>
      </div>
    </div>
  </div>
  <div>
    <div>
      <h2>Cambiar username</h2>
      <div class="config-fila">
        <input type="text" id="nuevo-username" placeholder="Nuevo username" />
        <button id="btn-cambiar-username">Enviar</button>
      </div>
      <p class="msg" id="msg-username"></p>
    </div>
    <div>
      <h2>Cambiar contraseña</h2>
      <div class="config-fila">
        <input
          type="password"
          id="nueva-contrasena"
          placeholder="Nueva contraseña"
        />
        <button id="btn-cambiar-contrasena">Enviar</button>
      </div>
      <p class="msg" id="msg-contrasena"></p>
    </div>
  </div>
  <div class="config-botones">
    <button id="btn-cerrar-sesion">Cerrar sesión</button>
    <button id="btn-eliminar-cuenta">Eliminar cuenta</button>
  </div>
</div>
