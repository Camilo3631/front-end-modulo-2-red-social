<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil</title>
  <link rel="icon" href="data:;base64,=">
  <link rel="stylesheet" href="../css/style.css"/>
</head>


<body>
  <main id="contenido">

  <!-- ── NAVBAR ── -->
  <nav>
    <div class="nav-links">
      <a class="active">Perfil</a>
      <a onclick="navContactos()">Contactos</a>
    </div>
    <div class="nav-icons">
      <button id="btn-nueva-publicacion" title="Nueva publicación">+</button>
      <button onclick="toggleConfig()" title="Ajustes">⚙</button>
    </div>
  </nav>

  <!-- ── INFO USUARIO ── -->
  <section class="info-usuario">
    <div class="info-izquierda">
      <img src="" alt="Foto de perfil" class="foto-perfil" id="foto-perfil"/>
      <span class="username" id="username">username_</span>
    </div>
    <div class="info-contadores">
      <div class="contador">
        <span class="contador-num" id="num-publicaciones">0</span>
        <span class="contador-label">Publicaciones</span>
      </div>
      <div class="contador">
        <span class="contador-num" id="num-contactos">0</span>
        <span class="contador-label">Contactos</span>
      </div>
    </div>
  </section>

  <!-- ── TABS ── -->
  <div class="tabs">
    <button class="tab active" onclick="cambiarTab('publicaciones', this)">Publicaciones</button>
    <button class="tab" onclick="cambiarTab('megusta', this)">Me gusta</button>
  </div>

  <!-- ── PUBLICACIONES ── -->
  <section id="seccion-publicaciones">
    <div id="lista-publicaciones">
      <!-- Las publicaciones se cargan aquí con JS -->
    </div>
    <p id="msg-publicaciones"> Aún no hay publicaciones</p>
  </section>

  <!-- ── ME GUSTA (oculto por defecto) ── -->
  <section id="seccion-megusta" style="display:none;">
    <p>Aún no hay me gusta.</p>
  </section>

  <section>
     <!-- ── PANEL CONFIGURACIÓN ── -->
      <aside class="panel-config" id="panel-config">
   <button onclick="toggleConfig()" id="cerrar-panel" title="Cerrar"> Cerrar</button>
    </div>
        <h2>Avatar</h2>
        <div class="avatar-opciones">
          <img src="/iconos/icono_1.png" alt="Avatar 1" class="avatar-opcion" onclick="seleccionarAvatar(this)"/>
          <img src="/iconos/icono_2.png" alt="Avatar 2" class="avatar-opcion" onclick="seleccionarAvatar(this)"/>
          <img src="/iconos/icono_3.png" alt="Avatar 3" class="avatar-opcion" onclick="seleccionarAvatar(this)"/>
          <img src="/iconos/icono_4.png" alt="Avatar 4" class="avatar-opcion" onclick="seleccionarAvatar(this)"/>
        </div>
   
        <h2>Cambiar username</h2>
        <div class="config-fila">
          <input type="text" id="nuevo-username" placeholder="Nuevo username" />
          <button onclick="cambiarUsername()">Enviar</button>
        </div>
        <p class="msg" id="msg-username"></p>
   
        <h2>Cambiar contraseña</h2>
        <div class="config-fila">
          <input type="password" id="nueva-contrasena" placeholder="Nueva contraseña" />
          <button onclick="cambiarContrasena()">Enviar</button>
        </div>
        <p class="msg" id="msg-contrasena"></p>
   
        <div class="config-botones">
          <button class="btn-cerrar-sesion" onclick="cerrarSesion()">Cerrar sesión</button>
          <button class="btn-eliminar-cuenta" onclick="eliminarCuenta()">Eliminar cuenta</button>
        </div>
   
      </aside>
   
    </div>

</main>

</section>


<script src="../js/ navigation.js"></script>

</body>
</html>
