<div class="main">
  <div>
    <div class="contenido-pantalla">
      <nav>
        <div class="nav-links">
          <a class="active">Perfil</a>
          <a onclick="navContactos()">Contactos</a>
        </div>
        <div class="nav-icons">
          <button id="btn-settings" onclick="toggleSettings(false)" title="Ajustes">⚙</button>
        </div>
      </nav>
    </div>
    <div id="perfil-info">
      <!-- ── INFO USUARIO ── -->
      <section class="info-usuario">
        <div class="info-izquierda">
          <div alt="Foto de perfil" class="foto-perfil" id="foto-perfil">
            <i class="fa-solid fa-user"></i>
          </div>
          <span class="username" id="username">username_</span>
        </div>
        <div class="info-contadores">
          <div class="contador">
            <span id="contador-posts" class="contador-num">0</span>
            <span class="contador-label">Publicaciones</span>
          </div>
          <div class="contador">
            <span class="contador-num" id="num-contactos">0</span>
            <span class="contador-label">Contactos</span>
          </div>
        </div>
      </section>
      <section class="crear-publicacion">
        <div id="form-publicacion">
          <div class="publicacion-input-container">
            <input type="text" id="texto-publicacion" placeholder="Crea una publicacion" required />
            <button onclick="publicar()">Publicar</button>
          </div>
        </div>
      </section>
      <div id="tabs">
        <button id="btn-publicaciones" class="tab active">Publicaciones</button>
      </div>

      <section id="seccion-publicaciones">
        <div id="lista-publicaciones"></div>
      </section>
      <section id="seccion-megusta" style="display:none;">
        <p>Aún no hay me gusta.</p>
      </section>
    </div>
  </div>

  <section>
    <aside id="panel-config" class="reducido"></aside>
  </section>
</div>
