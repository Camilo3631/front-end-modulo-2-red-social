<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta</title>
    <link rel="stylesheet" href="registro.css" />
  </head>
  <body>
    <section>
      <!--REGISTRO  →  POST /usuarios/registrar -->

      <div class="seccion">
        <h2>Crear cuenta</h2>

        <label for="reg-username">Nombre de usuario</label>
        <input type="text" id="reg-username" placeholder="mi_usuario" />

        <label for="reg-email">Correo electrónico</label>
        <input type="email" id="reg-email" placeholder="usuario@email.com" />

        <label for="reg-contrasena">Contraseña</label>
        <input
          type="password"
          id="reg-contrasena"
          placeholder="Mínimo 8 caracteres"
        />

        <button onclick="registrar()">Registrarse</button>
        <div class="mensaje" id="msg-registro"></div>
      </div>
    </section>

    <footer>
      <p class="card__footer">
        ¿Ya tienes cuenta?
        <a href="login.html">Inicia sesión</a>
      </p>
    </footer>
    <script src="js/nodes.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
